<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Todo 🌲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #1a472a 0%, #2d5a3d 50%, #3d7545 100%);
            color: #1B5E3F;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .app {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3.2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #66BB6A 0%, #A5D6A7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #A5D6A7;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .forest-card {
            background: linear-gradient(135deg, rgba(20,40,30,0.98) 0%, rgba(30,60,40,0.98) 100%);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(76,175,127,0.2);
            border: 2px solid rgba(102, 187, 106, 0.25);
            position: relative;
            overflow: hidden;
        }

        .forest-canvas {
            width: 100%;
            height: 420px;
            display: block;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            border-radius: 16px;
        }

        .forest-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
        }

        .stat {
            background: linear-gradient(135deg, rgba(102,187,106,0.15) 0%, rgba(165,214,167,0.1) 100%);
            padding: 18px;
            border-radius: 16px;
            border: 2px solid rgba(102, 187, 106, 0.25);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat:hover {
            border-color: rgba(102, 187, 106, 0.5);
            box-shadow: 0 6px 16px rgba(102, 187, 106, 0.2);
            transform: translateY(-3px);
        }

        .stat-label {
            display: block;
            font-size: 0.8em;
            color: #A5D6A7;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .stat-value {
            display: block;
            font-size: 2.4em;
            font-weight: 800;
            background: linear-gradient(135deg, #66BB6A, #A5D6A7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .add-task-form {
            display: flex;
            gap: 12px;
            animation: slideUp 0.8s ease-out 0.1s backwards;
        }

        .task-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(102, 187, 106, 0.3);
            border-radius: 14px;
            font-size: 0.98em;
            font-family: inherit;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.95);
            color: #1B5E3F;
        }

        .task-input::placeholder {
            color: #AAA;
        }

        .task-input:focus {
            outline: none;
            border-color: #66BB6A;
            box-shadow: 0 0 0 4px rgba(102, 187, 106, 0.15);
            background: white;
        }

        .add-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #66BB6A 0%, #4CAF7F 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 6px 16px rgba(102, 187, 106, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(102, 187, 106, 0.4);
        }

        .add-btn:active {
            transform: translateY(-1px);
        }

        .tasks-section {
            padding: 0;
        }

        .tasks-section h2 {
            margin-bottom: 18px;
            font-size: 1.4em;
            font-weight: 700;
            color: #A5D6A7;
            letter-spacing: -0.5px;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(165,214,167,0.1) 0%, rgba(102,187,106,0.05) 100%);
            border-radius: 14px;
            border: 2px solid rgba(102, 187, 106, 0.15);
            transition: all 0.2s ease;
            animation: slideIn 0.4s ease-out backwards;
        }

        .task-item:nth-child(1) { animation-delay: 0s; }
        .task-item:nth-child(2) { animation-delay: 0.05s; }
        .task-item:nth-child(3) { animation-delay: 0.1s; }
        .task-item:nth-child(4) { animation-delay: 0.15s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            border-color: #66BB6A;
            background: linear-gradient(135deg, rgba(165,214,167,0.2) 0%, rgba(102,187,106,0.1) 100%);
            box-shadow: 0 6px 16px rgba(102, 187, 106, 0.15);
            transform: translateX(6px);
        }

        .task-item.completed {
            background: linear-gradient(135deg, rgba(76,175,127,0.2) 0%, rgba(102,187,106,0.1) 100%);
            border-color: #66BB6A;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #66BB6A;
            flex-shrink: 0;
        }

        .task-title {
            flex: 1;
            font-size: 1em;
            font-weight: 500;
            color: #A5D6A7;
            transition: all 0.2s ease;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #666;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255,107,107,0.5);
            font-size: 1.3em;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #FF6B6B;
            transform: scale(1.25);
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            font-size: 1.05em;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2em;
            }

            .add-task-form {
                flex-direction: column;
                gap: 12px;
            }

            .add-btn {
                width: 100%;
            }

            .forest-stats {
                grid-template-columns: 1fr;
            }

            .forest-canvas {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🌲 Enchanted Forest Quest</h1>
            <p class="subtitle">Complete quests • Build your magical realm</p>
        </header>

        <div class="container">
            <div class="forest-card">
                <svg viewBox="0 0 200 280" class="forest-canvas" id="forestCanvas">
                    <defs>
                        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color: #4A90E2; stop-opacity: 1" />
                            <stop offset="40%" style="stop-color: #87CEEB; stop-opacity: 1" />
                            <stop offset="70%" style="stop-color: #90EE90; stop-opacity: 1" />
                            <stop offset="100%" style="stop-color: #7CB342; stop-opacity: 1" />
                        </linearGradient>
                        <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color: #4A90E2; stop-opacity: 0.9" />
                            <stop offset="100%" style="stop-color: #2C5AA0; stop-opacity: 1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
                        </filter>
                    </defs>

                    <!-- Sky background -->
                    <rect width="200" height="280" fill="url(#skyGradient)" />
                    
                    <!-- Sun -->
                    <circle cx="160" cy="30" r="20" fill="#FFD54F" opacity="0.9" filter="url(#glow)"/>
                    <circle cx="160" cy="30" r="15" fill="#FFF59D" opacity="0.5"/>

                    <!-- Distant mountains -->
                    <path d="M 0 90 Q 50 50 100 70 Q 150 50 200 100 L 200 140 L 0 140 Z" fill="#558B2F" opacity="0.8"/>
                    <path d="M 10 110 Q 40 80 80 95 Q 120 75 180 110 L 200 140 L 0 140 Z" fill="#689F38" opacity="0.6"/>

                    <!-- Water/Lake -->
                    <rect x="10" y="210" width="180" height="60" fill="url(#water)" rx="8"/>
                    <path d="M 10 215 Q 30 212 50 215 T 90 215 T 130 215 T 170 215 T 210 215" stroke="#2C5AA0" stroke-width="2" fill="none" opacity="0.6"/>
                    <path d="M 10 225 Q 35 222 60 225 T 110 225 T 160 225 T 200 225" stroke="#1A3A52" stroke-width="1.5" fill="none" opacity="0.5"/>

                    <!-- Rocks by water -->
                    <ellipse cx="25" cy="205" rx="8" ry="10" fill="#795548"/>
                    <ellipse cx="175" cy="208" rx="7" ry="9" fill="#795548"/>
                    <ellipse cx="100" cy="210" rx="6" ry="8" fill="#A1887F"/>

                    <!-- Grass/Moss ground -->
                    <rect y="170" width="200" height="40" fill="#558B2F"/>
                    <circle cx="20" cy="168" r="4" fill="#9CCC65" opacity="0.9"/>
                    <circle cx="40" cy="170" r="3.5" fill="#9CCC65" opacity="0.8"/>
                    <circle cx="65" cy="169" r="3" fill="#9CCC65" opacity="0.7"/>
                    <circle cx="90" cy="171" r="4" fill="#9CCC65" opacity="0.9"/>
                    <circle cx="115" cy="170" r="3.5" fill="#9CCC65" opacity="0.8"/>
                    <circle cx="140" cy="169" r="4" fill="#9CCC65" opacity="0.9"/>
                    <circle cx="165" cy="171" r="3" fill="#9CCC65" opacity="0.7"/>
                    <circle cx="185" cy="170" r="3.5" fill="#9CCC65" opacity="0.8"/>

                    <!-- Large bushes -->
                    <ellipse cx="30" cy="160" rx="16" ry="20" fill="#33691E"/>
                    <ellipse cx="25" cy="155" rx="12" ry="14" fill="#558B2F"/>
                    
                    <ellipse cx="170" cy="165" rx="18" ry="18" fill="#33691E"/>
                    <ellipse cx="178" cy="160" rx="13" ry="15" fill="#558B2F"/>

                    <!-- Ferns -->
                    <g opacity="0.8">
                        <path d="M 60 175 L 65 150 L 62 175 M 60 175 L 58 150 L 61 175 M 60 175 L 64 160 L 60 175" stroke="#558B2F" stroke-width="1.5" fill="none"/>
                        <path d="M 140 180 L 145 155 L 142 180 M 140 180 L 138 155 L 141 180 M 140 180 L 144 165 L 140 180" stroke="#558B2F" stroke-width="1.5" fill="none"/>
                    </g>

                    <!-- Animals -->
                    <g id="animals">
                        <!-- Deer -->
                        <g id="deer" opacity="0.9">
                            <ellipse cx="45" cy="140" rx="12" ry="8" fill="#8B6F47"/>
                            <circle cx="58" cy="138" r="6" fill="#9B8B6F"/>
                            <ellipse cx="55" cy="132" rx="2" ry="5" fill="#9B8B6F"/>
                            <ellipse cx="60" cy="131" rx="2" ry="5" fill="#9B8B6F"/>
                            <circle cx="60" cy="137" r="1.5" fill="#333"/>
                            <rect x="40" y="146" width="2.5" height="10" fill="#8B6F47"/>
                            <rect x="48" y="146" width="2.5" height="10" fill="#8B6F47"/>
                            <rect x="56" y="146" width="2.5" height="10" fill="#8B6F47"/>
                            <rect x="64" y="146" width="2.5" height="10" fill="#8B6F47"/>
                            <path d="M 35 142 Q 32 140 33 138" stroke="#6B5344" stroke-width="2" fill="none"/>
                        </g>

                        <!-- Rabbits -->
                        <g id="rabbit1" opacity="0.85">
                            <ellipse cx="120" cy="150" rx="8" ry="10" fill="#D4A574"/>
                            <circle cx="124" cy="143" r="5" fill="#D4A574"/>
                            <ellipse cx="122" cy="138" rx="1.5" ry="5" fill="#D4A574"/>
                            <ellipse cx="126" cy="137" rx="1.5" ry="5" fill="#D4A574"/>
                            <circle cx="125" cy="142" r="1" fill="#333"/>
                        </g>

                        <g id="rabbit2" opacity="0.8">
                            <ellipse cx="160" cy="155" rx="7" ry="9" fill="#C9956F"/>
                            <circle cx="163" cy="148" r="4" fill="#C9956F"/>
                            <ellipse cx="161" cy="143" rx="1.3" ry="4.5" fill="#C9956F"/>
                            <ellipse cx="165" cy="142" rx="1.3" ry="4.5" fill="#C9956F"/>
                            <circle cx="164" cy="147" r="0.8" fill="#333"/>
                        </g>
                    </g>

                    <!-- Flowers -->
                    <g id="flowers"></g>

                    <!-- Butterflies -->
                    <g id="butterflies"></g>

                    <!-- Birds flying -->
                    <g id="birds" opacity="0.8">
                        <g style="animation: fly 6s linear infinite">
                            <path d="M 30 35 Q 35 33 40 35" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                            <circle cx="30" cy="35" r="1.5" fill="#333"/>
                            <circle cx="40" cy="35" r="1.5" fill="#333"/>
                        </g>
                        <g style="animation: fly 7s linear infinite 1s">
                            <path d="M 140 40 Q 145 38 150 40" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                            <circle cx="140" cy="40" r="1.5" fill="#333"/>
                            <circle cx="150" cy="40" r="1.5" fill="#333"/>
                        </g>
                    </g>

                    <!-- Trees -->
                    <g id="trees"></g>
                </svg>
            </div>

            <div class="forest-stats">
                <div class="stat">
                    <span class="stat-label">🎯 Quests</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🌲 Trees</span>
                    <span class="stat-value" id="treesCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🦋 Wildlife</span>
                    <span class="stat-value" id="wildlifeCount">0</span>
                </div>
            </div>

            <form class="add-task-form" id="taskForm">
                <input type="text" id="taskInput" class="task-input" placeholder="What quest will you undertake?" />
                <button type="submit" class="add-btn">🚀 Quest</button>
            </form>

            <div class="forest-card tasks-section">
                <h2>Your Quests (<span id="taskCount">0</span>)</h2>
                <ul class="task-list" id="taskList">
                    <p class="empty">No quests yet. Begin your adventure to populate the forest! 🌿</p>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let nextId = 1;

        function loadTasks() {
            const saved = localStorage.getItem('forestTodos');
            if (saved) {
                tasks = JSON.parse(saved);
                nextId = Math.max(...tasks.map(t => t.id), 0) + 1;
            }
        }

        function saveTasks() {
            localStorage.setItem('forestTodos', JSON.stringify(tasks));
        }

        function addTask(title) {
            if (!title.trim()) return;
            
            const task = {
                id: nextId++,
                title: title.trim(),
                completed: false
            };
            
            tasks.unshift(task);
            saveTasks();
            renderTasks();
            updateForest();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateForest();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateForest();
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            
            taskCount.textContent = tasks.length;

            if (tasks.length === 0) {
                taskList.innerHTML = '<p class="empty">No quests yet. Begin your adventure to populate the forest! 🌿</p>';
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <input
                        type="checkbox"
                        class="task-checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    />
                    <span class="task-title">${task.title}</span>
                    <button type="button" class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
                </li>
            `).join('');
        }

        function updateForest() {
            const completedCount = tasks.filter(t => t.completed).length;
            const canvas = document.getElementById('forestCanvas');
            
            // Remove old trees
            canvas.querySelectorAll('g[data-tree]').forEach(t => t.remove());
            document.getElementById('flowers').innerHTML = '';
            document.getElementById('butterflies').innerHTML = '';

            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('wildlifeCount').textContent = Math.min(completedCount + 1, 10);

            const treeCount = Math.min(completedCount, 6);
            document.getElementById('treesCount').textContent = treeCount;

            // Enhanced tree positions
            const positions = [
                { x: 50, y: 80, size: 28 },
                { x: 100, y: 60, size: 32 },
                { x: 150, y: 75, size: 28 },
                { x: 70, y: 110, size: 24 },
                { x: 130, y: 115, size: 26 },
                { x: 35, y: 120, size: 22 }
            ];

            // Draw realistic trees
            for (let i = 0; i < treeCount; i++) {
                const pos = positions[i];
                const size = pos.size + (completedCount * 1.5);
                const x = pos.x;
                const y = pos.y;

                const treeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                treeGroup.setAttribute('data-tree', i);
                treeGroup.setAttribute('filter', 'url(#shadow)');
                treeGroup.style.animation = `sway 3s ease-in-out infinite`;
                treeGroup.style.animationDelay = `${i * 0.2}s`;

                // Trunk with texture
                const trunk = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                trunk.setAttribute('x', x - size / 12);
                trunk.setAttribute('y', y + size * 0.4);
                trunk.setAttribute('width', size / 6);
                trunk.setAttribute('height', size * 0.6);
                trunk.setAttribute('fill', '#6D4C41');
                trunk.setAttribute('rx', '4');

                // Trunk shadow
                const trunkShadow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                trunkShadow.setAttribute('x', x - size / 12);
                trunkShadow.setAttribute('y', y + size * 0.4);
                trunkShadow.setAttribute('width', size / 12);
                trunkShadow.setAttribute('height', size * 0.6);
                trunkShadow.setAttribute('fill', '#4E342E');
                trunkShadow.setAttribute('opacity', '0.4');
                trunkShadow.setAttribute('rx', '4');

                // Main foliage - back layer
                const foliageBack = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                foliageBack.setAttribute('cx', x);
                foliageBack.setAttribute('cy', y);
                foliageBack.setAttribute('r', size);
                foliageBack.setAttribute('fill', '#1B5E3F');

                // Main foliage
                const foliage = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                foliage.setAttribute('cx', x);
                foliage.setAttribute('cy', y);
                foliage.setAttribute('r', size);
                foliage.setAttribute('fill', '#2D8659');

                // Multiple highlight layers for 3D effect
                const highlight1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                highlight1.setAttribute('cx', x + size * 0.35);
                highlight1.setAttribute('cy', y - size * 0.35);
                highlight1.setAttribute('r', size * 0.45);
                highlight1.setAttribute('fill', '#66BB6A');
                highlight1.setAttribute('opacity', '0.7');

                const highlight2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                highlight2.setAttribute('cx', x + size * 0.2);
                highlight2.setAttribute('cy', y + size * 0.1);
                highlight2.setAttribute('r', size * 0.35);
                highlight2.setAttribute('fill', '#81C784');
                highlight2.setAttribute('opacity', '0.5');

                // Dark shadow for depth
                const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                shadow.setAttribute('cx', x - size * 0.4);
                shadow.setAttribute('cy', y + size * 0.35);
                shadow.setAttribute('r', size * 0.35);
                shadow.setAttribute('fill', '#0D3B2F');
                shadow.setAttribute('opacity', '0.5');

                // Build tree structure
                treeGroup.appendChild(foliageBack);
                treeGroup.appendChild(foliage);
                treeGroup.appendChild(shadow);
                treeGroup.appendChild(highlight1);
                treeGroup.appendChild(highlight2);
                treeGroup.appendChild(trunkShadow);
                treeGroup.appendChild(trunk);

                canvas.querySelector('#trees').appendChild(treeGroup);
            }

            // Add flowers
            const flowerPositions = [
                { x: 45, y: 165 },
                { x: 75, y: 168 },
                { x: 110, y: 166 },
                { x: 145, y: 169 },
                { x: 175, y: 167 }
            ];

            for (let i = 0; i < Math.min(completedCount, 5); i++) {
                const pos = flowerPositions[i];
                const flower = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                flower.style.animation = `float 3s ease-in-out infinite`;
                flower.style.animationDelay = `${i * 0.3}s`;

                // Stem
                const stem = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                stem.setAttribute('d', `M ${pos.x} ${pos.y} Q ${pos.x + 2} ${pos.y + 4} ${pos.x} ${pos.y + 10}`);
                stem.setAttribute('stroke', '#7CB342');
                stem.setAttribute('stroke-width', '2');
                stem.setAttribute('fill', 'none');

                // Petals
                const colors = ['#FF6B9D', '#FFD54F', '#FF7043', '#EC407A', '#AB47BC'];
                const petalCount = 6;
                for (let j = 0; j < petalCount; j++) {
                    const angle = (j * 360 / petalCount) * Math.PI / 180;
                    const px = pos.x + Math.cos(angle) * 5;
                    const py = pos.y + Math.sin(angle) * 5;
                    
                    const petal = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    petal.setAttribute('cx', px);
                    petal.setAttribute('cy', py);
                    petal.setAttribute('rx', '3');
                    petal.setAttribute('ry', '3.5');
                    petal.setAttribute('fill', colors[j % colors.length]);
                    petal.setAttribute('opacity', '0.9');
                    flower.appendChild(petal);
                }

                // Center
                const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                center.setAttribute('cx', pos.x);
                center.setAttribute('cy', pos.y);
                center.setAttribute('r', '2.5');
                center.setAttribute('fill', '#FFD54F');
                flower.appendChild(center);

                flower.appendChild(stem);
                canvas.querySelector('#flowers').appendChild(flower);
            }

            // Add butterflies
            if (completedCount > 0) {
                for (let i = 0; i < Math.min(completedCount, 5); i++) {
                    const butterfly = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    const x = 40 + (i * 28);
                    const y = 90 + (i * 8);
                    butterfly.style.animation = `float 4s ease-in-out infinite`;
                    butterfly.style.animationDelay = `${i * 0.5}s`;

                    const colors = ['#FF6B9D', '#FFD54F', '#FF7043', '#AB47BC', '#EC407A'];
                    
                    // Left wings
                    const wingL1 = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    wingL1.setAttribute('cx', x - 4);
                    wingL1.setAttribute('cy', y - 2);
                    wingL1.setAttribute('rx', '6');
                    wingL1.setAttribute('ry', '7');
                    wingL1.setAttribute('fill', colors[i]);
                    wingL1.setAttribute('opacity', '0.9');

                    const wingL2 = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    wingL2.setAttribute('cx', x - 5);
                    wingL2.setAttribute('cy', y + 3);
                    wingL2.setAttribute('rx', '4');
                    wingL2.setAttribute('ry', '5');
                    wingL2.setAttribute('fill', colors[(i + 1) % colors.length]);
                    wingL2.setAttribute('opacity', '0.7');

                    // Right wings
                    const wingR1 = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    wingR1.setAttribute('cx', x + 4);
                    wingR1.setAttribute('cy', y - 2);
                    wingR1.setAttribute('rx', '6');
                    wingR1.setAttribute('ry', '7');
                    wingR1.setAttribute('fill', colors[i]);
                    wingR1.setAttribute('opacity', '0.9');

                    const wingR2 = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    wingR2.setAttribute('cx', x + 5);
                    wingR2.setAttribute('cy', y + 3);
                    wingR2.setAttribute('rx', '4');
                    wingR2.setAttribute('ry', '5');
                    wingR2.setAttribute('fill', colors[(i + 1) % colors.length]);
                    wingR2.setAttribute('opacity', '0.7');

                    // Body
                    const body = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    body.setAttribute('cx', x);
                    body.setAttribute('cy', y);
                    body.setAttribute('rx', '2.5');
                    body.setAttribute('ry', '4');
                    body.setAttribute('fill', '#333');

                    butterfly.appendChild(wingL1);
                    butterfly.appendChild(wingL2);
                    butterfly.appendChild(wingR1);
                    butterfly.appendChild(wingR2);
                    butterfly.appendChild(body);
                    canvas.querySelector('#butterflies').appendChild(butterfly);
                }
            }
        }

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('taskInput');
            addTask(input.value);
            input.value = '';
            input.focus();
        });

        // Add animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fly {
                0% { transform: translateX(-50px); }
                100% { transform: translateX(250px); }
            }
            @keyframes float {
                0%, 100% { transform: translateY(0px) rotate(0deg); }
                50% { transform: translateY(-18px) rotate(12deg); }
            }
            @keyframes sway {
                0%, 100% { transform: rotate(0deg); }
                25% { transform: rotate(2deg); }
                75% { transform: rotate(-2deg); }
            }
        `;
        document.head.appendChild(style);

        loadTasks();
        renderTasks();
        updateForest();
    </script>
</body>
</html>
